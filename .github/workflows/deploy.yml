name: Deploy to GitHub Pages

on:
  # Déclenche l'action à chaque fois que tu pousses du code sur la branche 'main'
  push:
    branches: ["main"]

# Donne les permissions nécessaires à GitHub pour publier la page
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Préparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Générer le fichier des jours débloqués
        run: node scripts/build.js

      - name: Configuration de GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload des fichiers
        uses: actions/upload-pages-artifact@v3
        with:
          # On publie tout le dossier courant
          path: '.'

      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
